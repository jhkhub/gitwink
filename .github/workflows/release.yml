name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ''
          - os: macos-latest
            args: '--target universal-apple-darwin'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo workspace
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build + attach to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'gitwink ${{ github.ref_name }}'
          releaseBody: |
            Unsigned artefacts attached below.

            **Windows:** the `.msi` will show a SmartScreen "unknown publisher"
            warning until v0.1 picks up code-signing. Click "More info" →
            "Run anyway".

            **macOS:** Gatekeeper will block on first launch. Right-click the
            app → Open → confirm, or
            `xattr -d com.apple.quarantine /Applications/gitwink.app`.

            Full changes: see commits in this tag.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
